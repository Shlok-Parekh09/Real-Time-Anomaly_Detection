[build]
builder = "DOCKERFILE"
dockerfilePath = "fraud_detection_system/backend/Dockerfile"
watchPatterns = ["fraud_detection_system/backend/**"]

[deploy]
startCommand = "cd fraud_detection_system/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
